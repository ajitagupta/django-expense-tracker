<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Rumi Press{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
    .sidebar .nav-link { color: #495057; border-radius: 6px; margin-bottom: 2px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9ecef; color: #212529; }
    .sidebar .nav-link i { width: 20px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'home' %}"><i class="bi bi-book-half me-2"></i>Rumi Press</a>
    <span class="navbar-text text-secondary small">Book Distribution Tracker</span>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block sidebar py-3 px-3">
      <p class="text-uppercase text-muted small fw-bold mb-2">Manage</p>
      <ul class="nav flex-column mb-3">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'book_list' or request.resolver_match.url_name == 'home' %}active{% endif %}"
             href="{% url 'book_list' %}">
            <i class="bi bi-journals me-2"></i>Books
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'category' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'category_list' %}">
            <i class="bi bi-tags me-2"></i>Categories
          </a>
        </li>
      </ul>
      <p class="text-uppercase text-muted small fw-bold mb-2">Analytics</p>
      <ul class="nav flex-column mb-3">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'report' %}active{% endif %}"
             href="{% url 'report' %}">
            <i class="bi bi-bar-chart-line me-2"></i>Expense Report
          </a>
        </li>
      </ul>
      <p class="text-uppercase text-muted small fw-bold mb-2">Admin</p>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link" href="/admin/"><i class="bi bi-gear me-2"></i>Django Admin</a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="col-md-10 py-4 px-4">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
